<!DOCTYPE html>
<html>
<head>
    <title>Typing Speed Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Typing Speed Test ⌨️</h1>

    <p id="sentence">Click start to begin typing test</p>

    <textarea id="input" placeholder="Start typing here..." disabled></textarea>

    <br>

    <select id="timeSelect">
        <option value="30">30 sec</option>
        <option value="60">60 sec</option>
        <option value="120">120 sec</option>
    </select>

    <br><br>

    <button onclick="startTest()">Start</button>

    <p id="timer">Time: 0 sec</p>
</div>

<!-- ✅ OUTSIDE container -->
<div id="finalResult" style="display:none; text-align:center; margin-top:50px;">
    <h1>Test Completed 🎉</h1>
    <p id="finalText"></p>
    <button onclick="location.reload()">Restart</button>
</div>

<script src="script.js"></script>
</body>
</html>
